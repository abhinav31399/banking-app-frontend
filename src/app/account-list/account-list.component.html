<table class="table table-striped">
  <thead>
    <tr>
      <th>ID</th>
      <th>AccountHolderName</th>
      <th>Balance</th>
      <th>Actions</th>
    </tr>
  </thead>

  <tbody>
    <tr *ngFor="let account of accounts">
      <td>{{ account.id }}</td>
      <td>{{ account.firstName + ' ' + account.lastName }}</td>
      <td>{{ account.balance }}</td>
      <td>
        <button class="btn btn-info m-1" (click)="deposit(account.id)">Deposit</button>
        <button class="btn btn-info m-1" (click)="withdraw(account.id)">Withdraw</button>
        <button class="btn btn-danger m-1" (click)="delete(account.id)">Delete</button>
        <button class="btn btn-primary m-1" (click)="view(account.id)">View</button>
      </td>
    </tr>
  </tbody>
</table>
