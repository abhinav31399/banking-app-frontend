    <p class="mb-8 text-lg">Manage your accounts, deposits and withdrawals easily</p>

    <div class="space-x-4">

      <button (click)="goSignup()" class="bg-yellow-400 text-black px-6 py-3 rounded-lg font-semibold hover:bg-yellow-300">

  </div>
</div>
