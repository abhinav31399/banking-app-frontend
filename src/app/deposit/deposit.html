<div class="min-h-screen flex items-center justify-center bg-gray-100">

  <div class="bg-white shadow-xl rounded-2xl p-8 w-full max-w-md">

    <!-- Title -->
    <h2 class="text-2xl font-bold text-center text-gray-800 mb-6">
      Deposit Money
    </h2>

    <!-- Account Info -->
    <div class="mb-4 text-sm text-gray-600 text-center">
      Account: <span class="font-semibold">{{ account.firstName + ' ' + account.lastName }}</span>
      <br />
      Current Balance: ₹{{ account.balance }}
    </div>

    <!-- Success -->
    <div *ngIf="successMessage"
      class="mb-4 p-3 rounded-lg bg-green-100 text-green-700 text-center font-medium">
      {{ successMessage }}
    </div>

    <!-- Error -->
    <div *ngIf="errorMessage"
      class="mb-4 p-3 rounded-lg bg-red-100 text-red-700 text-center font-medium">
      {{ errorMessage }}
    </div>

    <!-- Form -->
    <form (ngSubmit)="onSubmit()" class="space-y-5">

      <div>
        <label class="block text-sm font-semibold text-gray-600 mb-1">
          Enter Amount
        </label>

        <input
          type="number"
          name="balance"
          [(ngModel)]="account.balance"
          placeholder="Enter amount"
          class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none"
        />
      </div>

      <button
        type="submit"
        class="w-full bg-blue-600 text-white py-2 rounded-lg font-semibold hover:bg-blue-700 transition duration-200">
        Deposit
      </button>

    </form>
  </div>
</div>
